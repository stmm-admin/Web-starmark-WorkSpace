services:
  db:
    image: postgres:15-alpine
    container_name: mogen-db
    environment:
      POSTGRES_USER: mogen_user
      POSTGRES_PASSWORD: mogen_pass
      POSTGRES_DB: mogen_db
    volumes:
      - mogen-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mogen-network

  strapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mogen-strapi
    depends_on:
      - db
    env_file: ./backend/.env
    ports:
      - "1337:1337"
    volumes:
      - ./backend/config:/opt/app/config
      - ./backend/src:/opt/app/src
      - ./backend/package.json:/opt/package.json
      - ./backend/public/uploads:/opt/app/public/uploads
      - ./backend/.tmp:/opt/app/.tmp
    networks:
      - mogen-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: mogen-frontend
    depends_on:
      - strapi
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - mogen-network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: mogen-nginx
    depends_on:
      - frontend
      - strapi
    ports:
      - "80:80"
    networks:
      - mogen-network

volumes:
  mogen-db-data:

networks:
  mogen-network:
    driver: bridge
